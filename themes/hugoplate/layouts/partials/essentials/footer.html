<footer class="bg-theme-light dark:bg-darkmode-theme-light">
  <div class="container">
    <div class="row items-center py-10">
      <div class="lg:col-3 mb-8 text-center lg:mb-0 lg:text-left">
        <!-- navbar brand/logo -->
        <a class="navbar-brand inline-block" href="{{ site.Home.RelPermalink }}">
          {{ partial "logo" }}
        </a>
      </div>
      <div class="lg:col-6 mb-8 text-center lg:mb-0">
        <ul>
          {{ range site.Menus.footer }}
          <li class="m-3 inline-block">
            <a {{ if findRE `^http` .URL }} target="_blank" rel="noopener" {{ end }} href="{{ if findRE `^#` .URL }}
                  {{ if not $.IsHome }}
                    {{ site.Home.RelPermalink }}
                  {{ end }}{{ .URL }}
                {{ else }}
                  {{ .URL | relLangURL }}
                {{ end }}">{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>
      </div>
      <div class="lg:col-3 mb-8 text-center lg:mb-0 lg:mt-0 lg:text-right">
        <ul class="social-icons">
          {{ range site.Data.social.main }}
<li>
  <a
    class="inline-flex items-center justify-center cursor-pointer pointer-events-auto"
    href="{{ .link | safeURL }}"
    aria-label="{{ .name }}"
    {{ if not (findRE `^mailto:` .link) }}target="_blank" rel="nofollow noopener"{{ end }}>
    <i class="{{ .icon }} pointer-events-none"></i>
  </a>
</li>
          {{ end }}
        </ul>
      </div>
    </div>
  </div>
  <div class="border-border dark:border-darkmode-border border-t py-5">
    <div class="text-light dark:text-darkmode-light container text-center space-y-2">
      <p>
        {{ site.Params.copyright | markdownify }}
      </p>

      <p class="text-xs text-gray-500">
        Last updated: March 2026
      </p>
    </div>
  </div>
</footer>
